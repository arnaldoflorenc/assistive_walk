
services:
  backend:
    build: ./server
    ports:
      - "3001:3000"
    volumes:
      - ./server:/app
      - /app/node_modules
    restart: always

  frontend:
    build: ./client
    ports:
      - "3000:3000"
    volumes:
      - ./client:/app
    stdin_open: true
    tty: true
    depends_on:
      - backend