
services:
  backend:
    build: ./server
    container_name: server
    ports:
      - "5000:5000"
    environment:
      - SERVER_PORT=5000
      - DB_HOST=db
      - DB_USER=dev
      - DB_PASSWORD=1234
      - DB_NAME=assistivedb
      - SECRET_KEY=456789
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - db
    volumes:
      - ./server:/app
      - /app/node_modules
    command: sh -c "npm install && npx prisma generate && npm run dev"
    restart: always

  frontend:
    build: ./client
    container_name: client
    ports:
      - "3000:3000"
    volumes:
      - ./client:/app
      - /app/node_modules
    stdin_open: true
    tty: true
    depends_on:
      - backend
    command: sh -c "npm install && npm start"
    restart: always
  
  db:
    image: mysql:8.0
    container_name: mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: assistivedb
      MYSQL_USER: dev
      MYSQL_PASSWORD: 1234
    volumes:
      - db_data:/var/lib/mysql
    
volumes:
  db_data: